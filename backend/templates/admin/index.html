{% extends "admin/index.html" %}

{% block content %}
<div class="module"
    style="margin-bottom: 20px; padding: 15px; background: #fff; border-left: 5px solid #417690; box-shadow: 0 1px 2px rgba(0,0,0,0.1);">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <div>
            <h2 style="margin: 0; color: #417690; font-size: 18px;">📊 Business Analytics Dashboard</h2>
            <p style="margin: 5px 0 0; color: #666;">Real-time insights on sales, orders, and product performance.</p>
        </div>
        <a href="{% url 'analytics_dashboard' %}"
            style="background-color: #417690; color: white; padding: 10px 20px; text-decoration: none; border-radius: 4px; font-weight: bold; transition: background 0.3s;">
            View Dashboard &rarr;
        </a>
    </div>
</div>
{{ block.super }}
{% endblock %}
