{% extends "admin/base_site.html" %}
{% load static %}

{% block content %}
<div class="analytics-dashboard">
    <h1>Project Progress & Business Analytics</h1>
    <div class="last-updated">Last Updated: <span id="last-updated-time">Just now</span></div>

    <!-- Summary Cards -->
    <div class="summary-cards">
        <div class="card">
            <h3>Total Revenue</h3>
            <p id="total-revenue" class="highlight">Loading...</p>
        </div>
        <div class="card">
            <h3>Total Orders</h3>
            <p id="total-orders" class="highlight">Loading...</p>
        </div>
    </div>

    <!-- Charts Container -->
    <div class="charts-container">
        <div class="chart-wrapper">
            <h2>Sales Trend (Last 30 Days)</h2>
            <canvas id="salesChart"></canvas>
        </div>
        <div class="chart-wrapper">
            <h2>Sales by Collection</h2>
            <canvas id="collectionChart"></canvas>
        </div>
    </div>
</div>

<style>
    .analytics-dashboard {
        padding: 20px;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .summary-cards {
        display: flex;
        gap: 20px;
        margin-bottom: 30px;
    }

    .card {
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        flex: 1;
        text-align: center;
    }

    .card h3 {
        margin-top: 0;
        color: #666;
        font-size: 0.9rem;
        text-transform: uppercase;
    }

    .card .highlight {
        font-size: 2rem;
        font-weight: bold;
        color: #2c3e50;
        margin: 10px 0 0;
    }

    .charts-container {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
    }

    .chart-wrapper {
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        flex: 1;
        min-width: 400px;
    }

    .last-updated {
        text-align: right;
        font-size: 0.8rem;
        color: #888;
        margin-bottom: 10px;
    }
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const salesCtx = document.getElementById('salesChart').getContext('2d');
        const collectionCtx = document.getElementById('collectionChart').getContext('2d');

        // Initialize Charts
        let salesChart = new Chart(salesCtx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Sales ($)',
                    data: [],
                    borderColor: '#3498db',
                    backgroundColor: 'rgba(52, 152, 219, 0.2)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: { responsive: true }
        });

        let collectionChart = new Chart(collectionCtx, {
            type: 'doughnut',
            data: {
                labels: [],
                datasets: [{
                    data: [],
                    backgroundColor: [
                        '#e74c3c', '#2ecc71', '#f1c40f', '#9b59b6', '#34495e'
                    ]
                }]
            },
            options: { responsive: true }
        });

        async function updateDashboard() {
            try {
                const response = await fetch('{% url "analytics_data" %}');
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();

                // Update Summary
                document.getElementById('total-revenue').innerText = '$' + data.summary.total_revenue.toLocaleString();
                document.getElementById('total-orders').innerText = data.summary.total_orders;

                const now = new Date();
                document.getElementById('last-updated-time').innerText = now.toLocaleTimeString();

                // Update Sales Chart
                salesChart.data.labels = data.chart_data.dates;
                salesChart.data.datasets[0].data = data.chart_data.sales;
                salesChart.update();

                // Update Collection Chart
                collectionChart.data.labels = data.pie_data.labels;
                collectionChart.data.datasets[0].data = data.pie_data.values;
                collectionChart.update();

            } catch (error) {
                console.error('Error fetching analytics data:', error);
            }
        }

        // Initial Load
        updateDashboard();

        // Poll every 30 seconds
        setInterval(updateDashboard, 30000);
    });
</script>
{% endblock %}
